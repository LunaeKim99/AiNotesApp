name: note_app
description: "A notes app with Clean Architecture, BLoC, and local WebView editor."
publish_to: 'none'
version: 0.2.0

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Dependency injection
  get_it: ^8.0.3

  # Local storage
  shared_preferences: ^2.5.3

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2

  # WebView
  webview_flutter: ^4.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/web/
    - assets/web/css/
    - assets/web/js/
